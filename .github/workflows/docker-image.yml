name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "prisma/**"
      - "package.json"
      - "bun.lock"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker-image.yml"
      - "vite.config.ts"
      - "tsconfig.json"
  workflow_dispatch:

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/pstrack
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  migrate:
    name: Validate migrations against empty Postgres
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: pstrack
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: pstrack
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pstrack -d pstrack"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgres://pstrack:ci_test_password@localhost:5432/pstrack

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Validate Prisma schema
        run: bunx prisma validate

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U pstrack >/dev/null 2>&1; then
              echo "Postgres ready"
              exit 0
            fi
            sleep 1
          done
          echo "Postgres did not become ready in 30s" >&2
          exit 1

      - name: Apply migrations to empty database
        run: bunx prisma migrate deploy

      - name: Verify schema matches migrations
        run: bunx prisma migrate diff --from-config-datasource --to-schema-datamodel prisma/schema.prisma --exit-code
        continue-on-error: true

  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: migrate
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Typecheck
        run: bun run typecheck

      - name: Build app
        env:
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL }}
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          VITE_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.VITE_SENTRY_TRACES_SAMPLE_RATE }}
          VITE_SENTRY_REPLAY_SESSION_SAMPLE_RATE: ${{ vars.VITE_SENTRY_REPLAY_SESSION_SAMPLE_RATE }}
          VITE_SENTRY_REPLAY_ERROR_SAMPLE_RATE: ${{ vars.VITE_SENTRY_REPLAY_ERROR_SAMPLE_RATE }}
        run: bun run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime-prebuilt
          platforms: linux/amd64
          provenance: false
          sbom: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          build-args: |
            VITE_BASE_URL=${{ vars.VITE_BASE_URL }}
            VITE_SENTRY_DSN=${{ vars.VITE_SENTRY_DSN }}

      # Coolify: get the webhook URL from the service's Webhooks tab and store it
      # as COOLIFY_WEBHOOK_URL in repo secrets (Settings → Secrets → Actions).
      # This step runs after migrate passes and the image is published.
      #
      # - name: Trigger Coolify redeploy
      #   env:
      #     COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
      #   run: |
      #     test -n "$COOLIFY_WEBHOOK_URL" || { echo "COOLIFY_WEBHOOK_URL is not set" >&2; exit 1; }
      #     curl --silent --fail-with-body --show-error \
      #       --request GET \
      #       "$COOLIFY_WEBHOOK_URL"
