name: CI

on:
  pull_request:
    branches: [main, stage]
  push:
    branches: [main, stage]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  lint:
    name: Biome CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bunx biome ci .

  knip:
    name: Knip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run knip --no-exit-code

  test:
    name: Vitest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pstrack
          POSTGRES_PASSWORD: pstrack
          POSTGRES_DB: pstrack
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
    env:
      DATABASE_URL: postgresql://pstrack:pstrack@127.0.0.1:5433/pstrack?schema=public
      DIRECT_URL: postgresql://pstrack:pstrack@127.0.0.1:5433/pstrack?schema=public
      TEST_DATABASE_URL: postgresql://pstrack:pstrack@127.0.0.1:5433/pstrack?schema=public
      # Skip t3-env validation so unit tests don't need every secret; the real DB
      # connection via TEST_DATABASE_URL provides the actual connectivity check.
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Apply migrations to test DB
        run: bunx prisma migrate deploy
      - run: bun run test

  validate-schema:
    name: Validate Prisma schema
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: pstrack
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: pstrack
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pstrack -d pstrack"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://pstrack:ci_test_password@127.0.0.1:5432/pstrack?schema=public
      DIRECT_URL: postgresql://pstrack:ci_test_password@127.0.0.1:5432/pstrack?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Generate Prisma client
        run: bunx prisma generate
      - name: Validate Prisma schema
        run: bunx prisma validate
      - name: Apply migrations to empty database
        run: bunx prisma migrate deploy
      - name: Verify schema matches migrations
        run: bunx prisma migrate diff --from-config-datasource --to-schema prisma/schema.prisma --exit-code

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build app
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" == "refs/heads/main" ]]; then
            base_url="${{ vars.VITE_BASE_URL }}"
            sentry_dsn="${{ vars.VITE_SENTRY_DSN }}"
            sentry_traces_sample_rate="${{ vars.VITE_SENTRY_TRACES_SAMPLE_RATE }}"
            sentry_replay_session_sample_rate="${{ vars.VITE_SENTRY_REPLAY_SESSION_SAMPLE_RATE }}"
            sentry_replay_error_sample_rate="${{ vars.VITE_SENTRY_REPLAY_ERROR_SAMPLE_RATE }}"

            test -n "$base_url" || {
              echo "VITE_BASE_URL is not set" >&2
              exit 1
            }

            export VITE_BASE_URL="$base_url"
            export VITE_SENTRY_TRACES_SAMPLE_RATE="${sentry_traces_sample_rate:-0}"
            export VITE_SENTRY_REPLAY_SESSION_SAMPLE_RATE="${sentry_replay_session_sample_rate:-0}"
            export VITE_SENTRY_REPLAY_ERROR_SAMPLE_RATE="${sentry_replay_error_sample_rate:-0}"

            if [[ -n "$sentry_dsn" ]]; then
              export VITE_SENTRY_DSN="$sentry_dsn"
            fi
          fi

          bun run build
      - name: Upload build output
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .output/
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true

  docker-changes:
    name: Docker change filter
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.filter.outputs.publish }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          fetch-depth: 0
      - name: Detect Docker-relevant changes
        id: filter
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" != "push" || "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event.before }}" =~ ^0+$ ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          echo "$changed_files"

          if grep -Eq '^(src/|public/|prisma/|prisma\.config\.ts$|package\.json$|bun\.lock$|Dockerfile$|\.dockerignore$|vite\.config\.ts$|tsconfig\.json$|\.github/workflows/ci\.yml$|\.github/actions/setup/action\.yml$)' <<< "$changed_files"; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

  publish-docker-image:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: [typecheck, lint, knip, test, validate-schema, build, docker-changes]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.docker-changes.outputs.publish == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .output/
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime-prebuilt
          platforms: linux/amd64
          provenance: false
          sbom: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          build-args: |
            VITE_BASE_URL=${{ vars.VITE_BASE_URL }}
            VITE_SENTRY_DSN=${{ vars.VITE_SENTRY_DSN }}

  deploy-coolify:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    needs: [publish-docker-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Trigger Coolify redeploy
        env:
          COOLIFY_API_URL: ${{ secrets.COOLIFY_API_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
        run: |
          test -n "$COOLIFY_API_URL" || {
            echo "COOLIFY_API_URL is not set" >&2
            exit 1
          }
          test -n "$COOLIFY_API_TOKEN" || {
            echo "COOLIFY_API_TOKEN is not set" >&2
            exit 1
          }
          test -n "$COOLIFY_APP_UUID" || {
            echo "COOLIFY_APP_UUID is not set" >&2
            exit 1
          }

          api_url="${COOLIFY_API_URL%/}"

          curl --silent --fail-with-body --show-error \
            --request GET \
            --header "Authorization: Bearer $COOLIFY_API_TOKEN" \
            --header "Accept: application/json" \
            "$api_url/api/v1/deploy?uuid=$COOLIFY_APP_UUID&force=false"

  # Trigger.dev production deployment is intentionally paused while production
  # Postgres is private to Coolify. Re-enable after Trigger.dev tasks are
  # refactored into authenticated HTTP dispatchers to app-owned job endpoints.

  sentry-sourcemaps:
    name: Sentry Source Maps
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test, validate-schema, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .output/
      - name: Upload source maps to Sentry
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          sourcemaps: ./.output
          ignore_missing: true
