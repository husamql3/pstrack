name: CI

on:
  pull_request:
    branches: [main, stage]
  push:
    branches: [main, stage]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  NODE_OPTIONS: --max-old-space-size=4096

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  lint:
    name: Biome CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/setup
      - run: bunx biome ci .

  knip:
    name: Knip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/setup
      - run: bun run knip --no-exit-code

  test:
    name: Vitest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pstrack
          POSTGRES_PASSWORD: pstrack
          POSTGRES_DB: pstrack
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
    env:
      DATABASE_URL: postgresql://pstrack:pstrack@127.0.0.1:5433/pstrack?schema=public
      DIRECT_URL: postgresql://pstrack:pstrack@127.0.0.1:5433/pstrack?schema=public
      TEST_DATABASE_URL: postgresql://pstrack:pstrack@127.0.0.1:5433/pstrack?schema=public
      # Skip t3-env validation so unit tests don't need every secret; the real DB
      # connection via TEST_DATABASE_URL provides the actual connectivity check.
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/setup
      - name: Apply migrations to test DB
        run: bunx prisma migrate deploy
      - run: bun run test

  redis-verify:
    name: Redis verification
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        command: redis-server --requirepass ci_redis_password
        options: >-
          --health-cmd "redis-cli -a ci_redis_password ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379
    env:
      # The harness only needs REDIS_URL; skip the full env schema like Vitest.
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/setup
      - name: Verify authenticated Redis behavior (TTL, sets, concurrency, reconnect)
        run: REDIS_URL=redis://default:ci_redis_password@127.0.0.1:6379 bun run verify:redis
      - name: Verify bounded failure when Redis is unavailable
        run: REDIS_URL=redis://127.0.0.1:59321 bun run verify:redis --unavailable
      - name: Verify bounded failure after an established connection is lost
        run: REDIS_URL=redis://default:ci_redis_password@127.0.0.1:6379 bun run verify:redis --outage-after-connect

  validate-schema:
    name: Validate Prisma schema
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: pstrack
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: pstrack
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pstrack -d pstrack"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://pstrack:ci_test_password@127.0.0.1:5432/pstrack?schema=public
      DIRECT_URL: postgresql://pstrack:ci_test_password@127.0.0.1:5432/pstrack?schema=public
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/setup
      - name: Generate Prisma client
        run: bunx prisma generate
      - name: Validate Prisma schema
        run: bunx prisma validate
      - name: Apply migrations to empty database
        run: bunx prisma migrate deploy
      - name: Verify schema matches migrations
        run: bunx prisma migrate diff --from-config-datasource --to-schema prisma/schema.prisma --exit-code

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/setup
      - name: Build app
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" == "refs/heads/main" ]]; then
            base_url="${{ vars.VITE_BASE_URL }}"
            sentry_dsn="${{ vars.VITE_SENTRY_DSN }}"
            sentry_traces_sample_rate="${{ vars.VITE_SENTRY_TRACES_SAMPLE_RATE }}"
            sentry_replay_session_sample_rate="${{ vars.VITE_SENTRY_REPLAY_SESSION_SAMPLE_RATE }}"
            sentry_replay_error_sample_rate="${{ vars.VITE_SENTRY_REPLAY_ERROR_SAMPLE_RATE }}"

            test -n "$base_url" || {
              echo "VITE_BASE_URL is not set" >&2
              exit 1
            }

            export VITE_BASE_URL="$base_url"
            export VITE_SENTRY_TRACES_SAMPLE_RATE="${sentry_traces_sample_rate:-0}"
            export VITE_SENTRY_REPLAY_SESSION_SAMPLE_RATE="${sentry_replay_session_sample_rate:-0}"
            export VITE_SENTRY_REPLAY_ERROR_SAMPLE_RATE="${sentry_replay_error_sample_rate:-0}"

            if [[ -n "$sentry_dsn" ]]; then
              export VITE_SENTRY_DSN="$sentry_dsn"
            fi
          fi

          bun run build
      - name: Upload build output
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: build-output
          path: .output/
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true

  deploy-vercel-staging:
    name: Deploy Vercel staging
    runs-on: ubuntu-latest
    needs: [typecheck, lint, knip, test, redis-verify, validate-schema, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/stage'
    environment:
      name: Staging
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      PSTRACK_GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/setup
      - name: Pull staging configuration
        run: bunx vercel@56.0.0 pull --yes --environment=production
      - name: Record staging revision
        run: printf '%s' "$PSTRACK_GIT_SHA" | bunx vercel@56.0.0 env add PSTRACK_GIT_SHA production --force --yes
      - name: Refresh staging configuration
        run: bunx vercel@56.0.0 pull --yes --environment=production
      - name: Build staging artifact
        # Force Nitro's Vercel preset so the build emits Build Output API v3 to
        # .vercel/output/. Without this, Nitro falls back to its default
        # (node/bun) preset and writes .output/, and `vercel build` then fails
        # with "No Output Directory named dist found". When .vercel/output/
        # exists, Vercel consumes it directly and the project's outputDirectory
        # setting is ignored.
        env:
          NITRO_PRESET: vercel
        run: bunx vercel@56.0.0 build --prod
      - name: Deploy staging artifact
        id: deploy
        run: |
          url="$(bunx vercel@56.0.0 deploy --prebuilt --prod)"
          echo "url=$url" >> "$GITHUB_OUTPUT"
      - name: Run staging smoke checks
        env:
          PSTRACK_STAGING_URL: https://pstrack.vercel.app
          PSTRACK_CANONICAL_STAGING_URL: https://pstrack.vercel.app
        run: bun run smoke:stage
      - name: Upload staging evidence
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: staging-evidence-${{ github.sha }}
          path: staging-smoke-evidence.json
          retention-days: 30
          if-no-files-found: warn

  docker-changes:
    name: Docker change filter
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.filter.outputs.publish }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          fetch-depth: 0
      - name: Detect Docker-relevant changes
        id: filter
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" != "push" || "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event.before }}" =~ ^0+$ ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          echo "$changed_files"

          if grep -Eq '^(src/|public/|prisma/|prisma\.config\.ts$|package\.json$|bun\.lock$|Dockerfile$|\.dockerignore$|vite\.config\.ts$|tsconfig\.json$|\.github/workflows/ci\.yml$|\.github/actions/setup/action\.yml$)' <<< "$changed_files"; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

  publish-docker-image:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs:
      [typecheck, lint, knip, test, redis-verify, validate-schema, build, docker-changes]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.docker-changes.outputs.publish == 'true'
    outputs:
      image_ref: ${{ steps.image.outputs.ref }}
      image_digest: ${{ steps.build.outputs.digest }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/setup
      - name: Download build output
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: build-output
          path: .output/
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: .
          target: runtime-prebuilt
          platforms: linux/amd64
          provenance: true
          sbom: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          # The cache is an optimization, not a release artifact. GHCR can
          # transiently terminate cache blob uploads with EOF after the image
          # itself has already been pushed; do not fail the release for that.
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max,ignore-error=true
          build-args: |
            VITE_BASE_URL=${{ vars.VITE_BASE_URL }}
            VITE_SENTRY_DSN=${{ vars.VITE_SENTRY_DSN }}
      - name: Resolve immutable image reference
        id: image
        run: |
          digest="${{ steps.build.outputs.digest }}"
          test -n "$digest" || {
            echo "Docker build did not return an image digest" >&2
            exit 1
          }
          echo "ref=${IMAGE_NAME}@${digest}" >> "$GITHUB_OUTPUT"
          {
            echo "image=${IMAGE_NAME}@${digest}"
            echo "digest=${digest}"
            echo "git_sha=${GITHUB_SHA}"
          } > image-release.env
      - name: Upload image release evidence
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: image-release-${{ github.sha }}
          path: image-release.env
          retention-days: 30
          if-no-files-found: error

  deploy-coolify:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    needs: [publish-docker-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/setup
      - name: Deploy immutable image with Coolify
        env:
          COOLIFY_API_URL: ${{ secrets.COOLIFY_API_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
          PSTRACK_GIT_SHA: ${{ github.sha }}
          PSTRACK_IMAGE_DIGEST: ${{ needs.publish-docker-image.outputs.image_digest }}
          PSTRACK_IMAGE_REF: ${{ needs.publish-docker-image.outputs.image_ref }}
        run: |
          bun run scripts/deploy-coolify.ts
      - name: Run production smoke checks
        env:
          PSTRACK_PRODUCTION_URL: ${{ vars.PSTRACK_PRODUCTION_URL }}
          PSTRACK_GIT_SHA: ${{ github.sha }}
          PSTRACK_IMAGE_DIGEST: ${{ needs.publish-docker-image.outputs.image_digest }}
          JOB_DISPATCH_SECRET: ${{ secrets.JOB_DISPATCH_SECRET }}
        run: |
          bun run scripts/smoke-prod.ts
      - name: Upload deployment evidence
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: deploy-evidence-${{ github.sha }}
          path: |
            deploy-evidence.json
            smoke-evidence.json
          retention-days: 30
          if-no-files-found: warn

  # Trigger.dev production deployment is intentionally paused while production
  # Postgres is private to Coolify. Re-enable after Trigger.dev tasks are
  # refactored into authenticated HTTP dispatchers to app-owned job endpoints.

  sentry-sourcemaps:
    name: Sentry Source Maps
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test, validate-schema, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Download build output
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: build-output
          path: .output/
      - name: Upload source maps to Sentry
        uses: getsentry/action-release@ff07929a6537bac57790c3451cf4d364aca38528
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          sourcemaps: ./.output
          ignore_missing: true
